<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL IVMS-4200 - DATAMID</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="toast-container"></div>







<div class="contenedor-principal">

    <div class="seccion-cabecera">
        <h1 class="titulo_principal">TERMINAL IVMS-4200</h1>
        <p class="texto_informativo">ADMINISTRACIÓN DE HORAS | DATAMID</p>
    </div>

    <div id="seccion-filtros" class="contenedor-filtros">
        <form onsubmit="event.preventDefault(); generarReporte();">
            <div class="rejilla-filtros">
                
                <div class="grupo-entrada">
                    <label class="etiqueta_entrada">Empleado</label>
                    <input type="text" id="nombre" class="input_neumorfico" value="Julian">
                </div>

                <div class="grupo-entrada">
                    <label class="etiqueta_entrada">Costo Hora</label>
                    <input type="number" id="pago" class="input_neumorfico" value="25" step="any">
                </div>

                <div class="grupo-entrada">
                    <label class="etiqueta_entrada">Bono</label>
                    <input type="number" id="bono" class="input_neumorfico" value="60" step="any">
                </div>

                <div class="grupo-entrada">
                    <label class="etiqueta_entrada">Desde</label>
                    <input type="text" id="inicio" class="input_neumorfico" placeholder="Seleccionar fecha">
                </div>

                <div class="grupo-entrada">
                    <label class="etiqueta_entrada">Hasta</label>
                    <input type="text" id="fin" class="input_neumorfico" placeholder="Seleccionar fecha">
                </div>

                <div style="display: flex; align-items: flex-end;">
                    <button type="submit" id="btn-ir" class="boton_ejecutar">
                        <span id="btn-text">IR</span>
                        <div id="btn-loader" class="spinner_carga oculto"></div>
                    </button>
                </div>

            </div>
        </form>
    </div>




    
    <div id="seccion-resultados" class="hidden">
        <div class="nav-header">
            <button onclick="location.reload()" class="tab-btn" style="font-weight:900;">← VOLVER</button>
            <div class="tabs-container" style="display:flex; gap:15px;">
                <button id="btn-tab-nomina" class="tab-btn active" onclick="cambiarTab('nomina')">NÓMINA</button>
                <button id="btn-tab-logs" class="tab-btn" onclick="cambiarTab('logs')">LOGS DE MARCAJE</button>
            </div>
        </div>

        <div id="tab-nomina" class="panel-resultados">

            <div class="tabla-nomina-container">
                <!-- ENCABEZADO FIJO -->
                <div class="tabla-header-fijo">
                    <table class="tabla-nomina">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Tiempo</th>
                                <th>Hrs Dec.</th>
                                <th>Pago Horas</th>
                                <th>Bono</th>
                                <th>Total Día</th>
                            </tr>
                        </thead>
                    </table>
                </div>

                <!-- CUERPO CON PADDING (exterior, sin scroll) -->
                <div class="tabla-body-scroll">
                    <!-- CONTENEDOR INTERNO CON SCROLL (100% alto/ancho) -->
                    <div class="tabla-body-inner">
                        <table class="tabla-nomina">
                            <tbody id="body-nomina"></tbody>
                        </table>
                    </div>
                </div>

                <!-- FOOTER FIJO -->
                <div class="tabla-footer-fijo">
                    <table class="tabla-nomina">
                        <tfoot>
                            <tr class="fila-totales">
                                <td>TOTALES</td>
                                <td id="t-tiempo"></td>
                                <td id="t-decimal" class="num"></td>
                                <td id="t-pago" class="monto"></td>
                                <td id="t-bono" class="bono"></td>
                                <td id="t-total" class="monto"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

        </div>



        <div id="tab-logs" class="panel-resultados hidden">
            <div class="scroll-area">
                <table class="table-res tabla-logs">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha y Hora</th>
                        </tr>
                    </thead>
                    <tbody id="body-detalles"></tbody>
                </table>
            </div>
            <div class="total-display pie-logs hidden"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
